<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Todo App</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; }
    input { padding: 8px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; margin-left: 8px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #f5f5f5; }
    .done { color: green; font-weight: bold; }
    .pending { color: #999; }
    #error { color: red; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <div>
    <input id="text" type="text" placeholder="New todo..." />
    <button onclick="createTodo()">Add</button>
  </div>
  <div id="error"></div>
  <table>
    <thead><tr><th>ID</th><th>Text</th><th>Status</th><th>Created</th><th>Processed At</th></tr></thead>
    <tbody id="list"></tbody>
  </table>
  <script>
    const API = '/api/todos';

    async function load() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(res.statusText);
        const todos = await res.json();
        document.getElementById('list').innerHTML = todos.map(t => `
          <tr>
            <td>${t.id}</td>
            <td>${t.text}</td>
            <td class="${t.processed ? 'done' : 'pending'}">${t.processed ? 'Processed' : 'Pending'}</td>
            <td>${new Date(t.created_at).toLocaleString()}</td>
            <td>${t.processed_at ? new Date(t.processed_at).toLocaleString() : '-'}</td>
          </tr>`).join('');
        document.getElementById('error').textContent = '';
      } catch (e) {
        document.getElementById('error').textContent = 'Failed to load todos: ' + e.message;
      }
    }

    async function createTodo() {
      const text = document.getElementById('text').value.trim();
      if (!text) return;
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error(res.statusText);
        document.getElementById('text').value = '';
        await load();
      } catch (e) {
        document.getElementById('error').textContent = 'Failed to create todo: ' + e.message;
      }
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
